name: Security Scan
on: [push, pull_request]

jobs:
  code-scan:
    name: Python SAST (Bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        run: |
          python -m pip install --upgrade pip
          pip install bandit
          
      - name: Run Bandit
        run: bandit -r . -ll